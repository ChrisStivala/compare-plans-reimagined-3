/* ── Help me choose: conditional wizard → plan recommendation ─ */
const HMC_BRANDS={tesla:'Tesla',byd:'BYD',merc:'Mercedes-Benz',other:'Another brand'};
const HMC_COMPAT=['tesla','byd','merc'];
function hmcNeedsTiebreak(){
  const h=S.hmc;
  if(h.have.battery||h.have.solar)return false;
  if(h.have.ev&&HMC_COMPAT.includes(h.evBrand))return false;
  if(h.timing==='weekdays'||h.shift==='yes')return false;
  return true;
}
function hmcPath(){
  const h=S.hmc,p=['have'];
  if(h.have.ev)p.push('brand');
  p.push('timing');
  if(h.timing==='evenings')p.push('shift');
  p.push('usage');
  if(hmcNeedsTiebreak())p.push('rewards');
  p.push('result');
  return p;
}
function hmcResult(){
  const h=S.hmc;
  if(h.have.battery)return{id:'battery',reason:`Your ${h.battKwh||10} kWh battery gets 4 free charging hours a day, plus 33c/kWh evening exports.`};
  if(h.have.ev&&HMC_COMPAT.includes(h.evBrand))return{id:'night',reason:`Your ${HMC_BRANDS[h.evBrand]} works with EV Power Up — charge overnight at 8c/kWh, a full charge from about $5.`};
  if(h.have.solar)return{id:'solar',reason:`With ${h.solarKw||'6.6'} kW of solar on the roof, a boosted feed-in tariff earns more from every export.`};
  if(h.timing==='weekdays')return{id:'wd',reason:'You use most of your power on weekdays 9am–5pm — exactly when Shift rates are half price.'};

let _closeTimer=null,_scrollY=0,_prevBody=null;
function _restoreScroll(){
  const b=document.body;
  if(_prevBody){b.style.position=_prevBody.pos;b.style.top=_prevBody.top;b.style.left=_prevBody.left;b.style.right=_prevBody.right;b.style.width=_prevBody.w;b.style.overflow=_prevBody.ov;_prevBody=null;}
  window.scrollTo(0,_scrollY);
}
function openModal(key){
  clearTimeout(_closeTimer);
  if(!S.activeModal){
    _scrollY=window.scrollY||0;
    const b=document.body;
    _prevBody={pos:b.style.position,top:b.style.top,left:b.style.left,right:b.style.right,w:b.style.width,ov:b.style.overflow};
    b.style.cssText+=`;position:fixed;top:${-_scrollY}px;left:0;right:0;width:100%;overflow:hidden`;
  }
  S.activeModal=key;S.modalClosing=false;
  document.getElementById('modal-layer').innerHTML=modalHTML();
  const ov=document.getElementById('modal-overlay');
  if(ov) ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  const cl=document.getElementById('modal-close');
  if(cl) cl.addEventListener('click',closeModal);
  bindSheetDrag();
}
// Mobile bottom sheets dismiss on a downward drag (when the sheet's
// own content is scrolled to the top).
function bindSheetDrag(){
  const sheet=document.getElementById('modal-sheet');
  if(!sheet||!L().isMobile) return;
  let y0=null,dy=0,dragging=false;
  sheet.addEventListener('touchstart',e=>{
    if(sheet.scrollTop>0)return;
    y0=e.touches[0].clientY;dy=0;dragging=true;
    sheet.style.transition='none';
  },{passive:true});
  sheet.addEventListener('touchmove',e=>{
    if(!dragging||y0===null)return;
    dy=e.touches[0].clientY-y0;
    if(dy>0) sheet.style.transform=`translateY(${dy}px)`;
  },{passive:true});
  sheet.addEventListener('touchend',()=>{
    if(!dragging)return;
    dragging=false;y0=null;
    if(dy>100&&!S.modalClosing){
      const ov=document.getElementById('modal-overlay');
      sheet.style.transition='transform .28s cubic-bezier(.64,0,.78,.39)';
      sheet.style.transform='translateY(115%)';
      if(ov) ov.style.animation='cpFadeOut .28s ease forwards';
      S.modalClosing=true;
      clearTimeout(_closeTimer);
      _closeTimer=setTimeout(()=>{_restoreScroll();S.activeModal=null;S.modalClosing=false;document.getElementById('modal-layer').innerHTML='';},300);
    }else{
      sheet.style.transition='transform .22s ease';
      sheet.style.transform='';
    }
  });
}
function closeModal(){
  if(S.modalClosing) return;
  S.modalClosing=true;
  document.getElementById('modal-layer').innerHTML=modalHTML();
  _closeTimer=setTimeout(()=>{_restoreScroll();S.activeModal=null;S.modalClosing=false;document.getElementById('modal-layer').innerHTML='';},300);
}

/* ── Flow ───────────────────────────────────────────────────── */
function goStep(step,push){
  S.step=step;
  if(push==='replace') history.replaceState({step},'','');
  else if(push!==false) history.pushState({step},'','');
  window.scrollTo(0,0);
  render();
}

/* ── Render ─────────────────────────────────────────────────── */
function render(){
  const lo=L();
  let body='';
  if(S.step==='hero') body=heroHTML(lo);
  else if(S.step==='q-situation') body=qSituationHTML(lo);
  else if(S.step==='services') body=servicesHTML(lo);
  else if(S.step==='elec') body=elecHTML(lo);
  else if(S.step==='gasp') body=gaspHTML(lo);
  else if(S.step==='net') body=netHTML(lo);
  else if(S.step==='quote') body=quoteHTML(lo);
  else if(S.step==='signup') body=signupFormHTML(lo);
  document.getElementById('root').innerHTML=topBarHTML(lo)+progressBarHTML()+body;
  if(S.step==='services') runReveal();
  if(S.step==='hero'){
    const inp=document.getElementById('addr-input');
    if(inp){
      inp.focus();
      inp.setSelectionRange(inp.value.length,inp.value.length);
      inp.addEventListener('input',e=>{
        S.addrValue=e.target.value;
        if(S.quote.address&&S.addrValue!==S.quote.address) S.quote.address='';
        const list=document.getElementById('addr-list');
        if(list) list.innerHTML=suggestListHTML(S.quote.address?'':S.addrValue);
        const go=document.getElementById('hero-go');
        if(go) go.textContent=S.quote.address?'See my plans':'Search';
      });
    }
  }
}

/* ── Events ─────────────────────────────────────────────────── */
document.addEventListener('click',e=>{
  const sg=e.target.closest('[data-suggest]');
  if(sg){
    S.quote.address=sg.getAttribute('data-suggest');
    S.quote.ces=sg.getAttribute('data-ces')==='1';
    S.addrValue=S.quote.address;
    goStep('q-situation');return;
  }
  const md=e.target.closest('[data-modal]');
  if(md){openModal(md.getAttribute('data-modal'));return;}
  const el=e.target.closest('[data-act]');
  if(!el) return;
  const act=el.getAttribute('data-act'),v=el.getAttribute('data-v');
  switch(act){
    case'step-back':history.back();break;
    case'hero-go':
      if(S.quote.address) goStep('q-situation');
      else{const i=document.getElementById('addr-input');if(i) i.focus();}
      break;
    case'q-moving':S.quote.moving=v;goStep('services');break;
    case'gas-tab':S.gasTab=v;render();break;
    case'filter':S.filters[v]=!S.filters[v];render();break;
    case'car-prev':case'car-next':{
      const row=document.getElementById(v);
      if(row){
        const card=row.querySelector('.rcard');
        const w=card?card.getBoundingClientRect().width+16:340;
        row.scrollBy({left:act==='car-next'?w:-w,behavior:'smooth'});
      }
      break;}
    case'pick-plan':
      if(S.step==='elec') S.quote.elecPlan=v;
      goStep(nextAfter(S.step));
      if(S.quote.elecPlan&&!S.quote.ces) openModal('offerGP');
      break;
    case'unlock-continue':closeModal();break;
    case'gp-add':S.quote.greenpower=true;closeModal();break;
    case'gp-skip':closeModal();break;
    case'modem-add':S.quote.modem=true;closeModal();render();break;
    case'modem-skip':closeModal();break;
    case'gas-add':
      S.quote.gasPlan=S.quote.elecPlan||'go';S.quote.lpg=null;
      goStep(nextAfter('gasp'));
      maybeUnlock();break;
    case'pick-net':S.quote.net=v;goStep(nextAfter('net'));openModal('offerModem');break;
    case'skip-product':{
      const was=S.step;
      if(was==='elec')S.quote.elecPlan=null;
      else if(was==='gasp'){S.quote.gasPlan=null;S.quote.lpg=null;}
      else if(was==='net')S.quote.net=null;
      goStep(nextAfter(was));
      if(was==='gasp') maybeUnlock();
      break;}
    case'lpg-qty':S.lpgQty=+v;render();break;
    case'lpg-add':S.quote.lpg={qty:S.lpgQty};S.quote.gasPlan=null;goStep(nextAfter('gasp'));maybeUnlock();break;
    case'est-modal':openModal('estimates');break;
    case'jump-plans':{
      const row=document.getElementById(v);
      if(row) window.scrollTo({top:row.getBoundingClientRect().top+window.scrollY-140,behavior:'smooth'});
      break;}
    case'benefit':S.benefitPlan=v;openModal('benefit');break;
    case'acc-toggle':{
      // One control across all cards: opening a section opens it on
      // every card and closes the other section (no re-render, so the
      // carousel scroll position survives).
      S.accOpen=S.accOpen===v?null:v;
      document.querySelectorAll('[data-acc]').forEach(p=>{
        p.style.display=p.getAttribute('data-acc')===S.accOpen?'block':'none';
      });
      document.querySelectorAll('[data-acc-btn]').forEach(b=>{
        const ic=b.querySelector('[data-acc-icon]');
        if(ic) ic.textContent=b.getAttribute('data-acc-btn')===S.accOpen?'\u00d7':'+';
      });
      break;}
    case'hmc-open':S.hmc.step='have';openModal('helpme');break;
    case'hmc-return':openModal('helpme');break;
    case'hmc-have':{
      if(e.target.closest('input'))break;
      const h=S.hmc.have;
      if(v==='none'){h.none=!h.none;if(h.none){h.solar=false;h.battery=false;h.ev=false;}}
      else{h[v]=!h[v];if(h[v])h.none=false;}
      openModal('helpme');break;}
    case'hmc-set':{
      const[f,val]=v.split(':');
      S.hmc[f]=val;
      if(f==='usage')S.answers.household=val==='low'?'s':val==='medium'?'m':'l';
      const p=hmcPath(),i=p.indexOf(S.hmc.step);
      S.hmc.step=p[Math.min(i+1,p.length-1)];
      openModal('helpme');break;}
    case'hmc-next':{const p=hmcPath(),i=p.indexOf(S.hmc.step);S.hmc.step=p[i+1];openModal('helpme');break;}
    case'hmc-back':{const p=hmcPath(),i=p.indexOf(S.hmc.step);if(i>0){S.hmc.step=p[i-1];openModal('helpme');}break;}
    case'hmc-reset':
      S.hmc={step:'have',have:{solar:false,battery:false,ev:false,none:false},solarKw:'6.6',battKwh:'10',evBrand:null,timing:null,shift:null,usage:null,rewards:null};
      openModal('helpme');break;
    case'hmc-apply':{
      const r=hmcResult();
      S.recommended=r.id;
      if(r.id==='solar')S.filters.Solar=true;
      if(r.id==='night')S.filters.EV=true;
      if(r.id==='battery')S.filters.Battery=true;
      closeModal();render();
      setTimeout(()=>{
        const row=document.getElementById('car-elec');
        const card=row&&row.querySelector(`[data-plan="${r.id}"]`);
        if(row&&card)row.scrollTo({left:Math.max(0,card.offsetLeft-24),behavior:'smooth'});
      },100);
      break;}
    case'ev-models':openModal('evModels');break;
    case'hh-set':S.answers.household=v;render();openModal('estimates');break;
    case'edit-step':goStep(v);break;
    case'go-signup':{
      const ident=(S.sf.ident||'').trim();
      if(!ident){const qi=document.getElementById('quote-id');if(qi) qi.focus();break;}
      const digits=ident.replace(/\D/g,'');
      if(ident.includes('@')) S.form.email=ident.toLowerCase();
      else if(digits) S.form.mobile=ident;
      S.sf.known=SEEDED.some(a=>ident.toLowerCase()===a.email||(digits.length>=8&&digits===a.mobile));
      S.sf.fromDetails=false;
      S.sf.step=S.sf.known?'password':'details';
      goStep('signup');break;}
    case'save-quote':openModal('savequote');break;
    case'copy-quote':{
      const url=location.origin+location.pathname+'?q='+serializeQuote();
      const done=()=>{const d=document.getElementById('copy-done');if(d)d.style.display='block';};
      if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(done,done);
      else done();
      break;}
    case'form-opt':{const[f,val]=v.split(':');S.form[f]=val;render();break;}
    case'sf-continue':{
      const em=(S.form.email||'').trim().toLowerCase();
      const mb=(S.form.mobile||'').replace(/\D/g,'');
      S.sf.known=SEEDED.some(a=>em===a.email||(!!mb&&mb===a.mobile));
      if(S.sf.known){S.sf.fromDetails=true;S.sf.ident=em||S.form.mobile;}
      S.sf.step=S.sf.known?'password':'finish';
      window.scrollTo(0,0);render();break;}
    case'sf-login-link':
      S.sf.fromDetails=true;S.sf.ident=S.sf.ident||(S.form.email||S.form.mobile||'');
      S.sf.step='password';window.scrollTo(0,0);render();break;
    case'sf-login':
      S.form.conc=S.form.conc||'No';S.form.life=S.form.life||'No';
      S.sf.step='finish';window.scrollTo(0,0);render();break;
    case'sf-back':{
      if(S.sf.step==='password'){
        if(S.sf.fromDetails){S.sf.step='details';window.scrollTo(0,0);render();}
        else history.back();
      }else if(S.sf.step==='finish'){
        S.sf.step=S.sf.known?'password':'details';window.scrollTo(0,0);render();
      }
      break;}
    case'signup-end':openModal('signupEnd');break;
    case'restart':
      S.step='hero';S.quoteRef=null;S.addrValue='';
      S.quote={address:'',ces:false,moving:null,elecPlan:null,gasPlan:null,lpg:null,net:null,greenpower:false,modem:false};
      S.gasTab='gas';S.unlockShown=false;S.accOpen=null;
      S.hmc={step:'have',have:{solar:false,battery:false,ev:false,none:false},solarKw:'6.6',battKwh:'10',evBrand:null,timing:null,shift:null,usage:null,rewards:null};
      S.recommended=null;
      S.filters={Solar:false,EV:false,Battery:false};
      S.form={first:'',last:'',email:'',mobile:'',conc:null,life:null};
      S.sf={step:'details',known:false,ident:'',fromDetails:false};
      window.scrollTo(0,0);render();break;
  }
});
document.addEventListener('input',e=>{
  const f=e.target.closest&&e.target.closest('[data-field]');
  if(f){S.form[f.getAttribute('data-field')]=f.value;return;}
  const hm=e.target.closest&&e.target.closest('[data-hmc]');
  if(hm){S.hmc[hm.getAttribute('data-hmc')]=hm.value;return;}
  if(e.target.id==='quote-id') S.sf.ident=e.target.value;
});
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&S.activeModal&&!S.modalClosing) closeModal();
});
window.addEventListener('popstate',e=>{
  S.step=(e.state&&e.state.step)||'hero';
  render();
});
let _lastW=window.innerWidth,_lastSig,_rT=null;
window.addEventListener('resize',()=>{
  const w=window.innerWidth;
  if(w===_lastW) return;
  _lastW=w;S.vw=w;
  clearTimeout(_rT);
  _rT=setTimeout(()=>{
    const sig=layoutSig();
    if(sig!==_lastSig){_lastSig=sig;render();}
  },80);
},{passive:true});

/* ── Init (restore saved quote from ?q=) ────────────────────── */
const _qp=new URLSearchParams(location.search).get('q');
if(_qp&&restoreQuote(_qp)) history.replaceState({step:'quote'},'','');
else history.replaceState({step:'hero'},'','');
_lastSig=layoutSig();
render();
})();
</script>
</body>
</html>
