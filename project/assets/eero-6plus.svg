<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <defs>
    <linearGradient id="blob" x1="0%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#FF9E1B"/>
      <stop offset="55%" stop-color="#FF7A3D"/>
      <stop offset="100%" stop-color="#F05FA4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- gradient blob -->
  <circle cx="110" cy="104" r="88" fill="url(#blob)"/>
  <circle cx="74" cy="158" r="44" fill="#F05FA4" opacity=".85"/>
  <!-- eero device: white squircle, slightly tilted -->
  <g transform="rotate(-8 110 108)" filter="url(#soft)">
    <rect x="42" y="46" width="136" height="124" rx="46" fill="#ffffff"/>
    <rect x="42" y="46" width="136" height="124" rx="46" fill="#F2F2F2" opacity=".35" transform="translate(0,6)"/>
    <rect x="42" y="46" width="136" height="118" rx="46" fill="#ffffff"/>
    <text x="110" y="112" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="600" letter-spacing="1" fill="#C9C9C9">eero</text>
    <circle cx="110" cy="146" r="3.4" fill="#E0E0E0"/>
  </g>
</svg>
